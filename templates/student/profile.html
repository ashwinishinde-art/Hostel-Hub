{% extends "base.html" %}

{% block title %}My Profile - Student Dashboard{% endblock %}

{% block content %}
<div class="container-fluid main-content">
    <h1 class="mb-4"><i class="fas fa-user"></i> My Profile</h1>
    
    <div class="row">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0">Edit Profile</h5>
                </div>
                <div class="card-body">
                    <form method="POST">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Full Name</label>
                                <input type="text" class="form-control" value="{{ current_user.full_name }}" disabled>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Email</label>
                                <input type="email" class="form-control" value="{{ current_user.email }}" disabled>
                            </div>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Username</label>
                                <input type="text" class="form-control" value="{{ current_user.username }}" disabled>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="phone" class="form-label">Phone Number</label>
                                <input type="tel" class="form-control" id="phone" name="phone" value="{{ student.phone or '' }}">
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="gender" class="form-label">Gender <span style="color: red;">*</span></label>
                                <select class="form-select" id="gender" name="gender" required>
                                    <option value="">-- Select Gender --</option>
                                    <option value="Male" {% if current_user.gender == 'Male' %}selected{% endif %}>Male</option>
                                    <option value="Female" {% if current_user.gender == 'Female' %}selected{% endif %}>Female</option>
                                </select>
                                <small class="text-muted">⚠️ Required for room allocation</small>
                            </div>
                        </div>
                        
                        <hr>
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Roll Number</label>
                                <input type="text" class="form-control" value="{{ student.roll_number }}" disabled>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Branch</label>
                                <input type="text" class="form-control" value="{{ student.branch }}" disabled>
                            </div>
                        </div>
                        
                        <hr>
                        <h5>Emergency Contact Information</h5>
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="contact_person_name" class="form-label">Contact Person Name</label>
                                <input type="text" class="form-control" id="contact_person_name" name="contact_person_name" value="{{ student.contact_person_name or '' }}">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="contact_person_phone" class="form-label">Contact Person Phone</label>
                                <input type="tel" class="form-control" id="contact_person_phone" name="contact_person_phone" value="{{ student.contact_person_phone or '' }}">
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <label for="emergency_contact_phone" class="form-label">Emergency Contact Phone</label>
                            <input type="tel" class="form-control" id="emergency_contact_phone" name="emergency_contact_phone" value="{{ student.emergency_contact_phone or '' }}">
                        </div>
                        
                        <hr>
                        <h5>Address Information</h5>
                        
                        <div class="mb-3">
                            <label for="address" class="form-label">Address</label>
                            <input type="text" class="form-control" id="address" name="address" value="{{ student.address or '' }}">
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="city" class="form-label">City</label>
                                <input type="text" class="form-control" id="city" name="city" value="{{ student.city or '' }}">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="state" class="form-label">State</label>
                                <input type="text" class="form-control" id="state" name="state" value="{{ student.state or '' }}">
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <label for="pincode" class="form-label">Pincode</label>
                            <input type="text" class="form-control" id="pincode" name="pincode" value="{{ student.pincode or '' }}">
                        </div>
                        
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save"></i> Save Changes
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
